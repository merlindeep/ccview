# GoReleaser configuration (schema v2).
# Docs: https://goreleaser.com
#
# Local dry run:   goreleaser release --snapshot --clean
# Validate config: goreleaser check
#
# A tagged release (vX.Y.Z) on GitHub triggers .github/workflows/release.yml,
# which runs `goreleaser release` to publish binaries, checksums, and an updated
# Homebrew formula in the tap repository.
version: 2

project_name: ccview

before:
  hooks:
    - go test ./...

builds:
  - id: ccview
    main: ./cmd/ccview
    binary: ccview
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/merlindeep/ccview/internal/buildinfo.Version={{ .Version }}
      - -X github.com/merlindeep/ccview/internal/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/merlindeep/ccview/internal/buildinfo.Date={{ .Date }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    # Default archive format is tar.gz on Unix, which is what we ship.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

# Homebrew tap formula.
#
# We publish a formula (the `brews` section) rather than a cask: a formula
# installs on both macOS and Linux — matching this project's darwin+linux build
# matrix — whereas Homebrew casks are macOS-only. GoReleaser deprecated `brews`
# in favour of `homebrew_casks` in v2.10, but the formula still works under the
# pinned `~> v2` toolchain and stays the right fit for a cross-platform CLI.
# See https://goreleaser.com/resources/deprecations/#brews — revisit before v3.
#
# On a tagged release GoReleaser pushes the generated formula to the tap repo
# (github.com/merlindeep/homebrew-tap), enabling:
#   brew install merlindeep/tap/ccview
# This requires a HOMEBREW_TAP_GITHUB_TOKEN secret with write access to the tap
# repo, exposed to the release workflow (.github/workflows/release.yml).
brews:
  - name: ccview
    # `auto` skips publishing the formula for prerelease tags (e.g. v1.0.0-rc1)
    # while still publishing it for normal releases.
    skip_upload: "auto"
    repository:
      owner: merlindeep
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/merlindeep/ccview"
    description: "Compact console monitor for AI coding-agent usage limits"
    license: "0BSD"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    install: |
      bin.install "ccview"
    test: |
      system "#{bin}/ccview", "version"

release:
  draft: false
  prerelease: auto
